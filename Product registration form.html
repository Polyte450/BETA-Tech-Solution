<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Registration</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .form-container {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .form-container h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    textarea {
      resize: none;
    }

    .btn {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<div class="form-container">
  <h2>Product Registration</h2>

  <form>
    <div class="form-group">
      <label>Product Name</label>
      <input type="text" placeholder="Enter product name" required>
    </div>

    <div class="form-group">
      <label>Category</label>
      <select required>
        <option value="">Select category</option>
        <option>Electronics</option>
        <option>Clothing</option>
        <option>Food</option>
        <option>Other</option>
      </select>
    </div>

    <div class="form-group">
      <label>Price ($)</label>
      <input type="number" placeholder="Enter price" required>
    </div>

    <div class="form-group">
      <label>Quantity</label>
      <input type="number" placeholder="Enter quantity" required>
    </div>

    <div class="form-group">
      <label>Product Description</label>
      <textarea rows="3" placeholder="Enter description"></textarea>
    </div>

    <div class="form-group">
      <label>Upload Image</label>
      <input type="file">
    </div>

    <button type="submit" class="btn">Register Product</button>
  </form>
</div>

</body>
</html>
